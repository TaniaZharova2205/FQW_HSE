services:
  api:
    build: .
    container_name: music_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/code
      - ./storage:/code/storage
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: music_worker
    command: python -m app.workers.run_worker
    env_file:
      - .env
    volumes:
      - ./:/code
      - ./storage:/code/storage
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: music_postgres
    restart: always
    environment:
      POSTGRES_DB: music_analyzer
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: music_redis
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: music_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: