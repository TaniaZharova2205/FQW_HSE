services:
  model-init:
    build: .
    container_name: music_model_init
    command: python -m scripts.bootstrap_models
    env_file:
      - .env
    volumes:
      - ./:/code
      - ./models:/code/models

  api:
    build: .
    container_name: music_api
    command: sh -c "python -m scripts.wait_for_models && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/code
      - ./storage:/code/storage
      - ./models:/code/models
    depends_on:
      - model-init
      - postgres
      - redis

  worker:
    build: .
    container_name: music_worker
    command: sh -c "python -m scripts.wait_for_models && python -m app.workers.run_worker"
    env_file:
      - .env
    volumes:
      - ./:/code
      - ./storage:/code/storage
      - ./models:/code/models
    depends_on:
      - model-init
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: music_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: music_postgres
    restart: always
    environment:
      POSTGRES_DB: music_analyzer
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: music_redis
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: music_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: